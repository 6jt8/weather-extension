name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      target:
        description: 'Build target'
        required: true
        type: choice
        default: 'chrome'
        options:
          - chrome
          - firefox
          - both
      create_release:
        description: 'Create GitHub release'
        required: true
        type: boolean
        default: true
      release_name:
        description: 'Release name (optional, defaults to "Release vX.Y.Z")'
        required: false
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected: X.Y.Z or vX.Y.Z (e.g. 1.2.0 or v1.2.0)"
            exit 1
          fi
          echo "Version: ${{ github.event.inputs.version }}"

      - name: Normalize version (strip leading v)
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="${INPUT_VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Normalized version: ${VERSION}"

      - name: Update version in files
        run: |
          VERSION="${VERSION}"

          cd src || exit 0
          if [ -f manifest.json ]; then
            cat manifest.json | jq --arg v "$VERSION" '.version = $v' > manifest.tmp.json
            mv manifest.tmp.json manifest.json
          fi
          cd ..

          if [ -f package.json ]; then
            cat package.json | jq --arg v "$VERSION" '.version = $v' > package.tmp.json
            mv package.tmp.json package.json
          fi

          echo "Version set to $VERSION"

      - name: Build release package
        run: |
          echo "Building for target: ${{ github.event.inputs.target }}"

          mkdir -p release

          if [ "${{ github.event.inputs.target }}" = "chrome" ] || [ "${{ github.event.inputs.target }}" = "both" ]; then
            echo "Building Chrome release..."
            # run your build script; adjust if your project needs npm install / npm run build
            node build.js || true

            # If your build produces a folder, zip it; otherwise, zip the repo or release output
            if [ -d release/weather_extension ]; then
              cd release/weather_extension
              zip -r ../../release/weather-extension-chrome-v${VERSION}.zip .
              cd ../..
            else
              # fallback: zip top-level release contents (adjust path as needed)
              zip -r release/weather-extension-chrome-v${VERSION}.zip .
            fi
            echo "Chrome ZIP created"
          fi

          if [ "${{ github.event.inputs.target }}" = "firefox" ] || [ "${{ github.event.inputs.target }}" = "both" ]; then
            echo "Building Firefox release..."
            mkdir -p release/firefox
            cp -r src/* release/firefox/

            cd release/firefox || exit 0
            cat manifest.json | jq '
              .manifest_version = 2 |
              .browser_action = .action |
              del(.action) |
              .permissions += .host_permissions |
              del(.host_permissions) |
              .browser_specific_settings = {"gecko": {"id": "weather-extension@horror69dev", "strict_min_version": "109.0"}}
            ' > manifest.firefox.json
            mv manifest.firefox.json manifest.json
            rm -f config.js config.example.js

            zip -r ../../release/weather-extension-firefox-v${VERSION}.zip .
            cd ../..
            echo "Firefox ZIP created"
          fi

          echo "Build results:"
          ls -la release/*.zip || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: release/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || format('Release v{0}', env.VERSION) }}
          body: |
            ## Weather Extension v${{ env.VERSION }}

            ### Release Info
            - **Version:** ${{ env.VERSION }}
            - **Target:** ${{ github.event.inputs.target }}

            ### Packages
            ${{ github.event.inputs.target == 'chrome' && '- Chrome Extension (.zip)' || '' }}
            ${{ github.event.inputs.target == 'firefox' && '- Firefox Extension (.zip)' || '' }}
            ${{ github.event.inputs.target == 'both' && '- Chrome Extension (.zip)\n- Firefox Extension (.zip)' || '' }}

            ### Installation
            1. Download and unpack the ZIP
            2. Chrome: `chrome://extensions/` -> Developer mode -> Load unpacked
            3. Firefox: `about:debugging#/runtime/this-firefox` -> Load Temporary Add-on -> select `manifest.json`

            ---
            Released on ${{ env.VERSION }}
          files: release/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
