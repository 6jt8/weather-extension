name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      target:
        description: 'Build target'
        required: true
        type: choice
        default: 'all'
        options:
          - chromium
          - firefox
          - safari
          - all
      create_release:
        description: 'Create GitHub release'
        required: true
        type: boolean
        default: true
      release_type:
        description: 'Release type'
        required: true
        type: choice
        default: 'release'
        options:
          - release
          - prerelease
          - draft
      release_name:
        description: 'Release name (optional)'
        required: false
        type: string
      attach_only:
        description: 'Attach files to release without replacing body (uses existing release if tag exists)'
        required: true
        type: boolean
        default: false
      skip_release_notes:
        description: 'Skip generating release notes'
        required: true
        type: boolean
        default: false
      commit_version:
        description: 'Commit version bump back to repository'
        required: true
        type: boolean
        default: true
      changelog_path:
        description: 'Custom changelog file path (relative to repo root)'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read
  id-token: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux (Chromium + Firefox + Safari source)
    outputs:
      version: ${{ steps.setup_version.outputs.version }}
      has_chromium: ${{ steps.setup_target.outputs.has_chromium }}
      has_firefox: ${{ steps.setup_target.outputs.has_firefox }}
      has_safari: ${{ steps.setup_target.outputs.has_safari }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install CLI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Setup version
        id: setup_version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Expected: X.Y.Z or vX.Y.Z"
            exit 1
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Version: ${VERSION}"

      - name: Setup target flags
        id: setup_target
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" = "all" ] || [ "$TARGET" = "chromium" ]; then
            echo "has_chromium=true" >> $GITHUB_OUTPUT
          else
            echo "has_chromium=false" >> $GITHUB_OUTPUT
          fi
          if [ "$TARGET" = "all" ] || [ "$TARGET" = "firefox" ]; then
            echo "has_firefox=true" >> $GITHUB_OUTPUT
          else
            echo "has_firefox=false" >> $GITHUB_OUTPUT
          fi
          if [ "$TARGET" = "all" ] || [ "$TARGET" = "safari" ]; then
            echo "has_safari=true" >> $GITHUB_OUTPUT
          else
            echo "has_safari=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in manifests
        run: |
          VERSION="${{ steps.setup_version.outputs.version }}"
          if [ -f "src/manifest.json" ]; then
            jq --arg v "$VERSION" '.version = $v' src/manifest.json > src/manifest.json.tmp
            mv src/manifest.json.tmp src/manifest.json
            echo "✅ Updated src/manifest.json"
          fi
          if [ -f "package.json" ]; then
            jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
            echo "✅ Updated package.json"
          fi

      - name: Build browser source
        id: build
        run: |
          TARGET="${{ github.event.inputs.target }}"
          echo "🏗️  Building for target: ${TARGET}"
          node .github/build-multi-browser.js "${TARGET}"
          echo "✅ Build completed"

      - name: Commit version bump
        if: ${{ github.event.inputs.commit_version == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=0
          if git diff --quiet src/manifest.json package.json; then
            echo "ℹ️  No version changes to commit"
          else
            CHANGED=1
            git add src/manifest.json package.json
            git commit -m "chore(release): bump version to ${{ steps.setup_version.outputs.version }}"
            git push
            echo "✅ Version bump committed"
          fi
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT

      - name: Package Chromium ZIP
        if: ${{ steps.setup_target.outputs.has_chromium == 'true' }}
        run: |
          echo "📦 Creating Chromium ZIP..."
          CHROMIUM_ZIP="release/weather-extension-chromium-v${{ steps.setup_version.outputs.version }}.zip"
          rm -f "$CHROMIUM_ZIP"
          for browser in chrome edge opera brave; do
            if [ -d "release/$browser" ]; then
              echo "  Adding $browser..."
              cd "release/$browser"
              zip -r -q "../../$CHROMIUM_ZIP" .
              cd ../..
            fi
          done
          echo "✅ $CHROMIUM_ZIP"

      - name: Package Firefox XPI
        if: ${{ steps.setup_target.outputs.has_firefox == 'true' }}
        run: |
          echo "📦 Creating Firefox XPI..."
          if [ -d "release/firefox" ]; then
            cd release/firefox
            zip -r -q "../../release/weather-extension-firefox-v${{ steps.setup_version.outputs.version }}.xpi" .
            cd ../..
            echo "✅ weather-extension-firefox-v${{ steps.setup_version.outputs.version }}.xpi"
          fi

      - name: Verify packages
        run: |
          echo "📋 Generated packages:"
          ls -lh release/*.{zip,xpi} 2>/dev/null | awk '{print "  " $9 " (" $5 ")"}'
          echo ""
          VERSION="${{ steps.setup_version.outputs.version }}"
          ERR=0
          if [ "${{ steps.setup_target.outputs.has_chromium }}" = "true" ]; then
            [ -f "release/weather-extension-chromium-v${VERSION}.zip" ] || { echo "❌ Missing chromium package"; ERR=1; }
          fi
          if [ "${{ steps.setup_target.outputs.has_firefox }}" = "true" ]; then
            [ -f "release/weather-extension-firefox-v${VERSION}.xpi" ] || { echo "❌ Missing firefox package"; ERR=1; }
          fi
          if [ "${{ steps.setup_target.outputs.has_safari }}" = "true" ]; then
            [ -f "release/weather-extension-safari-v${VERSION}.zip" ] || { echo "❌ Missing safari package"; ERR=1; }
          fi
          [ "$ERR" -eq 0 ] || exit 1
          echo "✅ All expected packages present"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ steps.setup_version.outputs.version }}
          path: |
            release/weather-extension-chromium-v${{ steps.setup_version.outputs.version }}.zip
            release/weather-extension-firefox-v${{ steps.setup_version.outputs.version }}.xpi
            release/weather-extension-safari-v${{ steps.setup_version.outputs.version }}.zip
            release/build-manifest.json
          retention-days: 30

  build-macos-safari:
    runs-on: macos-latest
    name: Build Safari macOS App
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'safari' }}
    needs: build-linux
    outputs:
      version: ${{ needs.build-linux.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Safari extension source
        run: |
          VERSION="${{ needs.build-linux.outputs.version }}"
          echo "🏗️  Building Safari source for v${VERSION}..."
          node .github/build-multi-browser.js safari
          echo "✅ Safari source ready"

      - name: Create Safari app bundle
        run: bash .github/build-safari-macos.sh "${{ needs.build-linux.outputs.version }}"

      - name: Upload Safari artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-app-${{ needs.build-linux.outputs.version }}
          path: release/weather-extension-safari-v${{ needs.build-linux.outputs.version }}.zip
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: [build-linux, build-macos-safari]
    if: |
      always() &&
      needs.build-linux.result == 'success'

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages-${{ needs.build-linux.outputs.version }}
          path: release/

      - name: Download Safari artifact
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'safari' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: safari-app-${{ needs.build-linux.outputs.version }}
          path: release/

      - name: Set release flags
        id: release_flags
        run: |
          case "${{ github.event.inputs.release_type }}" in
            draft)
              echo "draft=true" >> $GITHUB_OUTPUT
              echo "prerelease=false" >> $GITHUB_OUTPUT
              ;;
            prerelease)
              echo "draft=false" >> $GITHUB_OUTPUT
              echo "prerelease=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "draft=false" >> $GITHUB_OUTPUT
              echo "prerelease=false" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Determine release files
        id: release_files
        run: |
          VERSION="${{ needs.build-linux.outputs.version }}"
          FILES=""
          if [ "${{ needs.build-linux.outputs.has_chromium }}" = "true" ] && [ -f "release/weather-extension-chromium-v${VERSION}.zip" ]; then
            FILES="${FILES}release/weather-extension-chromium-v${VERSION}.zip "
          fi
          if [ "${{ needs.build-linux.outputs.has_firefox }}" = "true" ] && [ -f "release/weather-extension-firefox-v${VERSION}.xpi" ]; then
            FILES="${FILES}release/weather-extension-firefox-v${VERSION}.xpi "
          fi
          if [ "${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'safari' }}" = "true" ] && [ -f "release/weather-extension-safari-v${VERSION}.zip" ]; then
            FILES="${FILES}release/weather-extension-safari-v${VERSION}.zip "
          fi
          echo "files=${FILES}" >> $GITHUB_OUTPUT
          echo "✅ Release files: ${FILES}"

      - name: Set release body path
        id: body_path
        run: |
          if [ "${{ github.event.inputs.skip_release_notes }}" = "true" ]; then
            echo "path=" >> $GITHUB_OUTPUT
          else
            echo "path=release/release-notes.md" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-linux.outputs.version }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || format('Release v{0}', needs.build-linux.outputs.version) }}
          body_path: ${{ steps.body_path.outputs.path }}
          files: ${{ steps.release_files.outputs.files }}
          draft: ${{ steps.release_flags.outputs.draft }}
          prerelease: ${{ steps.release_flags.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: success()
        run: |
          echo "✅ Release v${{ needs.build-linux.outputs.version }}"
          echo "Target: ${{ github.event.inputs.target }}"
          echo "Files:"
          ls -1 release/*.{zip,xpi} 2>/dev/null | sed 's/^/  /'
