name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      target:
        description: 'Build target'
        required: true
        type: choice
        default: 'chrome'
        options:
          - chrome
          - firefox
          - edge
          - opera
          - safari
          - brave
          - all
      create_release:
        description: 'Create GitHub release'
        required: true
        type: boolean
        default: true
      release_type:
        description: 'Release type'
        required: true
        type: choice
        default: 'release'
        options:
          - release
          - prerelease
          - draft
      release_name:
        description: 'Release name (optional, defaults to "Release vX.Y.Z")'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest          

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected: X.Y.Z or vX.Y.Z (e.g. 1.2.0 or v1.2.0)"
            exit 1
          fi
          echo "Version: ${{ github.event.inputs.version }}"

      - name: Normalize version (strip leading v)
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="${INPUT_VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Normalized version: ${VERSION}"

      - name: Update version in files
        run: |
          VERSION="${VERSION}"

          cd src || exit 0
          if [ -f manifest.json ]; then
            cat manifest.json | jq --arg v "$VERSION" '.version = $v' > manifest.tmp.json
            mv manifest.tmp.json manifest.json
          fi
          cd ..

          if [ -f package.json ]; then
            cat package.json | jq --arg v "$VERSION" '.version = $v' > package.tmp.json
            mv package.tmp.json package.json
          fi

          echo "Version set to $VERSION"

      - name: Build release package
        run: |
          echo "Building for target: ${{ github.event.inputs.target }}"

          mkdir -p release

          build_chrome() {
            echo "Building Chrome release..."
            node build.js || true

            if [ -d release/weather_extension ]; then
              cd release/weather_extension
              zip -r ../../release/weather-extension-chrome-v${VERSION}.zip .
              cd ../..
            else
              zip -r release/weather-extension-chrome-v${VERSION}.zip .
            fi
            echo "Chrome ZIP created"
          }

          build_firefox() {
            echo "Building Firefox release..."
            mkdir -p release/firefox
            cp -r src/* release/firefox/

            cd release/firefox || exit 0
            cat manifest.json | jq '
              .manifest_version = 2 |
              .browser_action = .action |
              del(.action) |
              .permissions += .host_permissions |
              del(.host_permissions) |
              .browser_specific_settings = {"gecko": {"id": "weather-extension@horror69dev", "strict_min_version": "109.0"}}
            ' > manifest.firefox.json
            mv manifest.firefox.json manifest.json
            rm -f config.js config.example.js

            zip -r ../../release/weather-extension-firefox-v${VERSION}.xpi .
            cd ../..
            echo "Firefox XPI created"
          }

          build_edge() {
            echo "Building Edge release..."
            mkdir -p release/edge
            cp -r src/* release/edge/

            cd release/edge || exit 0
            cat manifest.json | jq '
              .minimum_chrome_version = "90" |
              .browser_specific_settings = {"edge": {"minimum_version": "90"}}
            ' > manifest.edge.json
            mv manifest.edge.json manifest.json

            zip -r ../../release/weather-extension-edge-v${VERSION}.zip .
            cd ../..
            echo "Edge ZIP created"
          }

          build_opera() {
            echo "Building Opera release..."
            mkdir -p release/opera
            cp -r src/* release/opera/

            cd release/opera || exit 0
            cat manifest.json | jq '
              .minimum_chrome_version = "89" |
              .browser_specific_settings = {"opera": {"minimum_version": "89"}}
            ' > manifest.opera.json
            mv manifest.opera.json manifest.json

            zip -r ../../release/weather-extension-opera-v${VERSION}.zip .
            cd ../..
            echo "Opera ZIP created"
          }

          build_brave() {
            echo "Building Brave release..."
            mkdir -p release/brave
            cp -r src/* release/brave/

            cd release/brave || exit 0
            cat manifest.json | jq '
              .minimum_chrome_version = "91"
            ' > manifest.brave.json
            mv manifest.brave.json manifest.json

            zip -r ../../release/weather-extension-brave-v${VERSION}.zip .
            cd ../..
            echo "Brave ZIP created"
          }

          build_safari() {
            echo "Building Safari release..."
            mkdir -p release/safari
            cp -r src/* release/safari/

            cd release/safari || exit 0
            cat manifest.json | jq '
              .manifest_version = 3 |
              .browser_specific_settings = {"safari": {"minimum_version": "14"}}
            ' > manifest.safari.json
            mv manifest.safari.json manifest.json

            # Safari benötigt spezielle Struktur
            zip -r ../../release/weather-extension-safari-v${VERSION}.zip .
            cd ../..
            echo "Safari ZIP created"
          }

          TARGET="${{ github.event.inputs.target }}"

          if [ "$TARGET" = "chrome" ] || [ "$TARGET" = "all" ]; then
            build_chrome
          fi

          if [ "$TARGET" = "firefox" ] || [ "$TARGET" = "all" ]; then
            build_firefox
          fi

          if [ "$TARGET" = "edge" ] || [ "$TARGET" = "all" ]; then
            build_edge
          fi

          if [ "$TARGET" = "opera" ] || [ "$TARGET" = "all" ]; then
            build_opera
          fi

          if [ "$TARGET" = "brave" ] || [ "$TARGET" = "all" ]; then
            build_brave
          fi

          if [ "$TARGET" = "safari" ] || [ "$TARGET" = "all" ]; then
            build_safari
          fi

          echo "Build results:"
          ls -la release/ || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: release/
          retention-days: 30

      - name: Determine release draft and prerelease flags
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          
          if [ "$RELEASE_TYPE" = "draft" ]; then
            echo "DRAFT=true" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "Release-Modus: DRAFT"
          elif [ "$RELEASE_TYPE" = "prerelease" ]; then
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=true" >> $GITHUB_ENV
            echo "Release-Modus: PRERELEASE"
          else
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "Release-Modus: STABLE"
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || format('Release v{0}', env.VERSION) }}
          body: |
            ## Weather Extension v${{ env.VERSION }}

            ### Release Info
            - **Version:** ${{ env.VERSION }}
            - **Target:** ${{ github.event.inputs.target }}
            - **Release Type:** ${{ github.event.inputs.release_type }}

            ### Verfügbare Browser
            - **Chrome** - ZIP Format
            - **Firefox** - XPI Format (Mozilla Add-ons)
            - **Edge** - ZIP Format
            - **Opera** - ZIP Format
            - **Brave** - ZIP Format
            - **Safari** - ZIP Format

            ### Unterstützte Formate
            - **ZIP**: Chrome, Edge, Opera, Brave, Safari (ladbar als entpackte Erweiterung)
            - **XPI**: Firefox (natives Firefox-Erweiterungsformat, für Mozilla Add-ons)

            ### Installation

            **Chrome & Chromium-basiert (Edge, Opera, Brave):**
            1. Download und entpacken der ZIP-Datei
            2. Öffne `chrome://extensions/` (oder Äquivalent)
            3. Aktiviere "Entwicklermodus"
            4. Klick "Entpackte Erweiterung laden"
            5. Wähle den entpackten Ordner

            **Firefox:**
            1. Download der XPI-Datei
            2. Öffne `about:addons`
            3. Klick auf das Zahnrad-Symbol → "Datei installieren"
            4. Wähle die heruntergeladene XPI-Datei

            **Safari:**
            1. Download und entpacken der ZIP-Datei
            2. Öffne Safari → Einstellungen → Erweiterungen
            3. Drag & Drop des Ordners in den Bereich
            4. Bestätige die Installation

            ### Changelog
            - Version: ${{ env.VERSION }}
            - Release Datum: $(date -u +'%Y-%m-%d')

            ---
            *Dieser Release wurde automatisch generiert.*
          files: release/*.{zip,xpi}
          draft: ${{ env.DRAFT }}
          prerelease: ${{ env.PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
