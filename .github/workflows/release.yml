name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      target:
        description: 'Build target'
        required: true
        type: choice
        default: 'all'
        options:
          - chrome
          - firefox
          - edge
          - opera
          - brave
          - safari
          - all
      create_release:
        description: 'Create GitHub release'
        required: true
        type: boolean
        default: true
      release_type:
        description: 'Release type'
        required: true
        type: choice
        default: 'release'
        options:
          - release
          - prerelease
          - draft
      release_name:
        description: 'Release name (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build & Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install CLI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Expected: X.Y.Z or vX.Y.Z"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"

      - name: Normalize version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="${INPUT_VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "✅ Normalized version: $VERSION"

      - name: Update version in manifests
        run: |
          VERSION="${{ env.VERSION }}"
          
          if [ -f "src/manifest.json" ]; then
            jq --arg v "$VERSION" '.version = $v' src/manifest.json > src/manifest.json.tmp
            mv src/manifest.json.tmp src/manifest.json
            echo "✅ Updated src/manifest.json"
          fi
          
          if [ -f "package.json" ]; then
            jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
            echo "✅ Updated package.json"
          fi

      - name: Build all browser versions
        run: |
          echo "🏗️  Building browser extensions..."
          node build-multi-browser.js
          echo "✅ All versions built"

      - name: Package Chrome
        run: |
          cd release/chrome
          zip -r -q ../../release/weather-extension-chrome-v${{ env.VERSION }}.zip .
          cd ../..
          echo "✅ Chrome: weather-extension-chrome-v${{ env.VERSION }}.zip"

      - name: Package Firefox
        run: |
          cd release/firefox
          zip -r -q ../../release/weather-extension-firefox-v${{ env.VERSION }}.xpi .
          cd ../..
          echo "✅ Firefox: weather-extension-firefox-v${{ env.VERSION }}.xpi"

      - name: Package Edge
        run: |
          cd release/edge
          zip -r -q ../../release/weather-extension-edge-v${{ env.VERSION }}.zip .
          cd ../..
          echo "✅ Edge: weather-extension-edge-v${{ env.VERSION }}.zip"

      - name: Package Opera
        run: |
          cd release/opera
          zip -r -q ../../release/weather-extension-opera-v${{ env.VERSION }}.zip .
          cd ../..
          echo "✅ Opera: weather-extension-opera-v${{ env.VERSION }}.zip"

      - name: Package Brave
        run: |
          cd release/brave
          zip -r -q ../../release/weather-extension-brave-v${{ env.VERSION }}.zip .
          cd ../..
          echo "✅ Brave: weather-extension-brave-v${{ env.VERSION }}.zip"

      - name: Package Safari
        run: |
          cd release/safari
          zip -r -q ../../release/weather-extension-safari-v${{ env.VERSION }}.zip .
          cd ../..
          echo "✅ Safari: weather-extension-safari-v${{ env.VERSION }}.zip"

      - name: Verify packages
        run: |
          echo "📋 Generated packages:"
          ls -lh release/*.{zip,xpi} 2>/dev/null | awk '{print "  " $9 " (" $5 ")"}'
          
          echo -e "\n🔍 Verifying package contents..."
          for file in release/*.{zip,xpi}; do
            if [ -f "$file" ]; then
              echo "  $file:"
              unzip -l "$file" | head -15
              echo ""
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ env.VERSION }}
          path: release/*.{zip,xpi}
          retention-days: 30

      - name: Determine release flags
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          
          if [ "$RELEASE_TYPE" = "draft" ]; then
            echo "DRAFT=true" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "🟡 Release mode: DRAFT"
          elif [ "$RELEASE_TYPE" = "prerelease" ]; then
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=true" >> $GITHUB_ENV
            echo "🟠 Release mode: PRERELEASE"
          else
            echo "DRAFT=false" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "🟢 Release mode: STABLE"
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || format('Release v{0}', env.VERSION) }}
          body: |
            # Weather Extension v${{ env.VERSION }}

            ## 📋 Release Information
            - **Version:** ${{ env.VERSION }}
            - **Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - **Release Type:** ${{ github.event.inputs.release_type }}

            ## 🌐 Available Downloads

            ### Chrome & Chromium-Based
            - **Chrome** - `weather-extension-chrome-v${{ env.VERSION }}.zip`
            - **Edge** - `weather-extension-edge-v${{ env.VERSION }}.zip`
            - **Opera** - `weather-extension-opera-v${{ env.VERSION }}.zip`
            - **Brave** - `weather-extension-brave-v${{ env.VERSION }}.zip`

            ### Firefox
            - **Firefox** - `weather-extension-firefox-v${{ env.VERSION }}.xpi`

            ### Apple
            - **Safari** - `weather-extension-safari-v${{ env.VERSION }}.zip`

            ## 📦 Package Contents
            Each package includes:
            - ✅ All source files with proper browser-specific manifest
            - ✅ Icons (SVG + PNG formats, 16x16, 48x48, 128x128)
            - ✅ Localization files (25+ languages)
            - ✅ Popup UI (HTML, CSS, JavaScript)
            - ✅ Background & content scripts

            ## 🚀 Installation Guide

            ### Chrome & Chromium Browsers (Chrome, Edge, Opera, Brave)
            1. Download the appropriate `.zip` file
            2. Extract to a folder
            3. Open browser extensions page:
               - Chrome/Brave: `chrome://extensions/`
               - Edge: `edge://extensions/`
               - Opera: `opera://extensions/`
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the extracted folder

            ### Firefox
            1. Download `weather-extension-firefox-v${{ env.VERSION }}.xpi`
            2. Open Firefox or go to `about:addons`
            3. Click settings icon (⚙️) → "Install add-on from file"
            4. Select the `.xpi` file

            ### Safari
            1. Download and extract the `.zip` file
            2. Open Safari → Settings → Extensions
            3. Drag & drop the extracted folder into the Extensions area
            4. Confirm the installation

            ## 🔧 Build Details
            - **Manifest Version:** MV3 (Chrome, Edge, Opera, Brave, Safari) | MV2 (Firefox)
            - **Minimum Browser Versions:**
              - Chrome: Latest
              - Edge: 90+
              - Opera: 89+
              - Brave: 91+
              - Firefox: 109+
              - Safari: 14+

            ## ✨ What's Included
            - Real-time weather data from Open-Meteo API
            - 7-day weather forecast
            - 25+ language support
            - Geolocation support
            - Favorite locations management

            ---
            *Automatically built by GitHub Actions*
          files: release/*.{zip,xpi}
          draft: ${{ env.DRAFT }}
          prerelease: ${{ env.PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release Summary"
          echo "=================="
          echo "Version: v${{ env.VERSION }}"
          echo "Type: ${{ github.event.inputs.release_type }}"
          echo "Packages:"
          ls -1 release/*.{zip,xpi} 2>/dev/null | sed 's/^/  - /'
